# 是否显示进度
print-progress: true

# 并发线程数（你的仓库 Actions 性能有限，建议保持 20）
concurrent: 20
check-interval: 120

# --- 🚀 核心优化部分：放宽筛选门槛 ---

# 1. 延迟要求：5秒内有响应即保留
timeout: 5000
alive-test-url: http://gstatic.com/generate_204

# 2. 速度要求：放宽至 128KB/s (原为 512KB/s)
# 这样能救回大量被误杀的普通节点
min-speed: 128

# 测速下载限制
speed-test-url: https://github.com/AaronFeng753/Waifu2x-Extension-GUI/releases/download/v2.21.12/Waifu2x-Extension-GUI-v2.21.12-Portable.7z
download-timeout: 10
download-mb: 10
total-speed-limit: 0

# --- 🔒 移除解锁限制部分 ---

# 彻底关闭流媒体与 AI 检测
media-check: false
media-check-timeout: 10

# 清空平台要求，不再要求解锁 OpenAI/Netflix/Gemini 等
platforms: []

# 节点名称过滤（保持为空，不按名字杀节点）
filter: []

# --- ⚙️ 系统与保存配置 ---

listen-port: ":8199"
rename-node: true
node-prefix: ""
keep-success-proxies: false
output-dir: ""
enable-web-ui: true
api-key: ""
save-method: local
sub-store-port: ":8299"
sub-store-path: ""

# 订阅覆写规则（建议保持原样）
mihomo-overwrite-url: "http://127.0.0.1:8199/sub/ACL4SSR_Online_Full.yaml"

# --- 🔗 订阅源部分（已保留你原有的全部 20+ 个源） ---

